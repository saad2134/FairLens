version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fairlens-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./fairlens.db
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - fairlens-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fairlens-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fairlens-network

  db:
    image: postgres:15-alpine
    container_name: fairlens-db
    environment:
      - POSTGRES_USER=fairlens
      - POSTGRES_PASSWORD=fairlens
      - POSTGRES_DB=fairlens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fairlens-network

volumes:
  uploads:
    driver: local
  postgres_data:
    driver: local

networks:
  fairlens-network:
    driver: bridge